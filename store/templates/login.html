<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body { font-family: Arial; background: linear-gradient(to right, #4facfe, #00f2fe); display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
.container { background:#fff; padding:30px; border-radius:10px; width:350px; box-shadow:0 5px 15px rgba(0,0,0,0.2);}
input { width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc;}
button { width:100%; padding:10px; background:#4facfe; border:none; color:#fff; border-radius:5px; cursor:pointer; font-size:16px;}
button:hover { background:#00f2fe;}
.message { color:red; margin-bottom:10px;}
</style>
</head>
<body>
<div class="container">
  <h2>Login</h2>
  {% if form.errors %}
  <div class="message">Invalid username or password</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
</div>
</body>
</html>
